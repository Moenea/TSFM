# Batch metrics config for ZJSH 2103 PI10102 transition-process models.
#
# Covers 6 Timer-XL variants (zero-shot S/MS, full-shot S/MS, partial15 S/MS)
# and the 13 MyTimeXer-style baselines (CNNLSTM/DiPCALSTM/LSTMGRU/
# STAConvBiLSTM/TCNTransformer/TimeXer/GTProger/GTProgerV13). Each model uses
# its own seq_len/pred_len in build_window_starts so pred.npy is decoded
# against the correct windowing.
#
# `align_eval_to` filters every model's windows to the same time slice that a
# Timer-XL window (seq_len=768, pred_len=96) would cover, namely
# [file_off + 768, file_off + L - 96] per file. This aligns the evaluation
# region across short-window baselines and long-context Timer-XL.
#
# HH/H/L/LL limits for PI10102 come from setting/limits_zjsh.csv (260/160).
# NOTE: batch_metrics.py concatenates all 'test' files below and interprets
# pred.npy / true.npy saved by exp_forecast as sliding-window predictions
# over that concatenation. Window starts are per-file (never cross a file
# boundary), matching MultivariateDatasetYAMLSplit's loader behaviour.

params:
  target: "PI10102"
  limit_csv_path: "/home/aicode/sherwin/TSFM/setting/limits_zjsh.csv"
  data_root: "/home/aicode/sherwin/dataset/ZJSH"
  results_root: "./results"
  split_file: "setting/ZJSH_PI10102ts.yaml"
  alarm_quality_rmse_factor: 0.01
  eval_steps: 15
  input_clean_steps: 30
  align_eval_to:
    seq_len: 768
    pred_len: 96

# Each entry may override seq_len/pred_len. Timer-XL: 768/96. Baselines: 30/15.
model_dirs:
  # ----- Timer-XL (long-context, zero-shot / full-shot / partial15) -----
  - name: "Timer-XL-Zeroshot-S"
    seq_len: 768
    pred_len: 96
    result_dir: "zeroshot_ZJSH_PI10102TS_S"
  - name: "Timer-XL-Zeroshot-MS"
    seq_len: 768
    pred_len: 96
    result_dir: "zeroshot_ZJSH_PI10102TS_MS"
  - name: "Timer-XL-S"
    seq_len: 768
    pred_len: 96
    result_dir: "forecast_ZJSH_PI10102TS_S_full_shot_timer_xl_MultivariateDatasetYAMLSplit_sl768_it96_ot96_lr5e-06_bt32_wd0_el8_dm1024_dff2048_nh8_cosTrue_test_0"
  - name: "Timer-XL-MS"
    seq_len: 768
    pred_len: 96
    result_dir: "forecast_ZJSH_PI10102TS_MS_full_shot_timer_xl_MultivariateDatasetYAMLSplit_sl768_it96_ot96_lr5e-06_bt32_wd0_el8_dm1024_dff2048_nh8_cosTrue_test_0"
  - name: "Timer-XL-Partial15-S"
